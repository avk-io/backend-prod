<!DOCTYPE html>
<html>
<head>
  <title>socket terminal</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #00ff88;
      font-family: monospace;
    }

    .container {
      padding: 20px;
    }

    .title {
      color: #00ff88;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #log {
      height: 70vh;
      overflow-y: auto;
      border: 1px solid #00ff88;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      outline: none;
    }

    button {
      padding: 10px;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      cursor: pointer;
    }

    button:hover {
      background: #00ff88;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">> real-time terminal chat</div>

    <div id="log"></div>

    <input id="msg" placeholder="type message..." />
    <button onclick="sendMsg()">send</button>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>
    const socket = io("http://localhost:3000");

    const log = document.getElementById("log");

    function print(text) {
      const div = document.createElement("div");
      div.textContent = "> " + text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    socket.on("connect", () => {
      print("connected: " + socket.id);
    });

    socket.on("message", (msg) => {
      print("recv: " + msg);
    });

    function sendMsg() {
      const input = document.getElementById("msg");
      const msg = input.value;

      socket.emit("message", msg);
      print("sent: " + msg);

      input.value = "";
    }
  </script>
</body>
</html>
